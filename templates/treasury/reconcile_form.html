{% extends "page/layout.html" %}
{% block title %}Reconciliation{% endblock %}
{% block page_content %}
<h1 class="title">Cash/Bank Reconciliation</h1>
<form method="post" class="panel">
    {% csrf_token %}
    <p>
        <label>Money Account</label>
        <select name="money_account">
            {% for acc in accounts %}
            <option value="{{ acc.id }}">{{ acc.name }} ({{ acc.currency }})</option>
            {% endfor %}
        </select>
    </p>
    <p><label>Reconciliation Date</label><input type="date" name="reconciliation_date" required></p>
    <p><label>Physical Count</label><input type="number" step="0.01" name="physical_count" required></p>
    <p><label>Reason</label><textarea name="reason" required></textarea></p>
    <button class="btn" type="submit">Run Reconciliation</button>
</form>
{% endblock %}
