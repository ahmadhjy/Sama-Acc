{% extends "page/layout.html" %}
{% block title %}AP Allocation{% endblock %}
{% block page_content %}
<h1 class="title">Create AP Allocation</h1>
<form method="post" class="panel">
    {% csrf_token %}
    <p>
        <label>Payment</label>
        <select name="payment">
            {% for p in payments %}
            <option value="{{ p.id }}">{{ p.receipt_no }} | remaining {{ p.remaining_amount }}</option>
            {% endfor %}
        </select>
    </p>
    <p>
        <label>Supplier Bill</label>
        <select name="bill">
            {% for b in bills %}
            <option value="{{ b.id }}">{{ b.bill_no }} | total {{ b.grand_total }}</option>
            {% endfor %}
        </select>
    </p>
    <p><label>Amount</label><input type="number" step="0.01" name="amount" required></p>
    <button class="btn" type="submit">Allocate</button>
</form>
{% endblock %}
