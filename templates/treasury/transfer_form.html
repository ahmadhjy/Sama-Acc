{% extends "page/layout.html" %}
{% block title %}New Transfer{% endblock %}
{% block page_content %}
<h1 class="title">Create Account Transfer</h1>
<form method="post" class="panel">
    {% csrf_token %}
    <p><label>From Account</label><select name="from_account">{% for acc in accounts %}<option value="{{ acc.id }}">{{ acc.name }}</option>{% endfor %}</select></p>
    <p><label>To Account</label><select name="to_account">{% for acc in accounts %}<option value="{{ acc.id }}">{{ acc.name }}</option>{% endfor %}</select></p>
    <p><label>Date</label><input type="date" name="date" required></p>
    <p><label>Amount</label><input type="number" step="0.01" name="amount" required></p>
    <p><label>Reference</label><input name="reference"></p>
    <button class="btn" type="submit">Create Transfer</button>
</form>
{% endblock %}
